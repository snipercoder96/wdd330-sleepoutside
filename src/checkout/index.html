<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <link rel="stylesheet" href="../css/style.css" />
  <script type="module" src="../js/checkout.js"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>
    </section>

    <form id="checkoutForm" method="post" action="./sucess.html">
      <!-- Customer Name -->
      <label for="fname">First Name</label>
      <input type="text" id="fname" name="fname" required placeholder="John" />

      <label for="lname">Last Name</label>
      <input type="text" id="lname" name="lname" required placeholder="Doe" />

      <!-- Address -->
      <label for="street">Street Address</label>
      <input type="text" id="street" name="street" required placeholder="123 Main St" />

      <label for="city">City</label>
      <input type="text" id="city" name="city" required placeholder="New York" />

      <label for="state">State</label>
      <input type="text" id="state" name="state" required placeholder="NY" />

      <label for="zip">Zip Code</label>
      <input type="text" id="zip" name="zip" required placeholder="10001" />

      <!-- Payment -->
      <label for="cardNumber">Credit Card Number</label>
      <input type="text" id="cardNumber" name="cardNumber" required placeholder="1234 5678 9012 3456" />

      <label for="expiration">Expiration Date</label>
      <input type="text" id="expiration" name="expiration" placeholder="MM/YY" required />

      <label for="code">Security Code</label>
      <input type="password" id="code" name="code" required placeholder="123" />

      <input type="hidden" name="timestamp" id="timestamp" />
      <!-- Important-->

      <!-- Order Summary -->
      <summary id="orderSummary">
        <h3>Order Summary</h3>
        <p>Subtotal: <span id="subtotal"></span></p>
        <p>Tax (6%): <span id="tax"></span></p>
        <p>Shipping: <span id="shipping"></span></p>
        <p>
          <strong>Total: <span id="orderTotal"></span></strong>
        </p>
      </summary>
      <!-- Submit -->
      <button type="submit" id="checkoutButton">Checkout</button>
    </form>

  </main>

  <footer id="main-footer"></footer>
</body>

</html>
